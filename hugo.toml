#===================# BASE SETTING #===================#
baseURL      = 'https://masputrawae.github.io/experimentally'
languageCode = 'en-US'
title        = 'My Notes'

#===================# PARAMETERS #===================#
[params]
  [params.author]
    name          = "John Doe"
    tagline       = "Designer"
    logo          = "https://randomuser.me/api/portraits/men/75.jpg"
    description   = "Pariatur duis esse sunt pariatur adipisicing."
    email         = "john.doe@example.com"
    phone         = "+1-234-567-8901"

  [params.cta]
    [[params.cta.buttons]]
      name    = "About"
      url     = "about"
      icon    = "bi-person"
      primary = false
    [[params.cta.buttons]]
      name    = "Download CV"
      url     = "https://download.cv/"
      icon    = "bi-download"
      primary = true

  [params.social]
    [params.social.facebook]
      name = "Facebook"
      url  = "https://facebook.com/johndoe"
      icon = "bi-facebook"
    [params.social.twitter]
      name = "TwitterX"
      url  = "https://x.com/johndoe"
      icon = "bi-twitter-x"
    [params.social.instagram]
      name = "Instagram"
      url  = "https://instagram.com/johndoe"
      icon = "bi-instagram"
    [params.social.github]
      name = "Github"
      url  = "https://github.com/johndoe"
      icon = "bi-github"

#===================# MENU #===================#
[[menus.main]]
  name    = 'Home'
  pageRef = '/'
  pre     = "<i class='bi bi-house'></i>"
  weight  = 10

[[menus.main]]
  name    = 'About'
  pageRef = '/About'
  pre     = "<i class='bi bi-person'></i>"
  weight  = 20

[[menus.main]]
  name    = 'Projects'
  pageRef = '/Projects'
  pre     = "<i class='bi bi-folder'></i>"
  weight  = 30

[[menus.main]]
  name    = 'Categories'
  pageRef = '/categories'
  pre     = "<i class='bi bi-grid'></i>"
  weight  = 50

[[menus.main]]
  name    = 'Tags'
  pageRef = '/tags'
  pre     = "<i class='bi bi-tag'></i>"
  weight  = 60

[[menus.main]]
  name    = 'Archives'
  pageRef = '/archives'
  pre     = "<i class='bi bi-archive'></i>"
  weight  = 70

#===================# MODULE #===================#
[module]
  [module.hugoVersion]
    extended = false
    min      = "0.116.0"

#===================# MARKUP #===================#
[markup]

  [markup.tableOfContents]
    endLevel    = 6
    ordered     = false
    startLevel  = 2

  [markup.highlight]
    codeFences         = true
    guessSyntax        = true
    style              = "github-dark"
    noClasses          = false
    lineNumbersInTable = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe    = true

#===================# OUTPUT #===================#
[mediaTypes]
  [mediaTypes."application/json"]
    suffixes = ["json"]

[outputFormats]
  [outputFormats.search]
    mediaType = "application/json"
    baseName = "search"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "search"]