{{- $u := urls.Parse .Destination -}}
<a href="{{ .Destination | safeURL }}"
  {{- with .Title }} title="{{ . }}" class="link link--internal" {{ end -}}
  {{- if $u.IsAbs }} rel="external noopener noreferrer nofollow" target="_blank" class="link link--external" {{ end -}}
>
  {{- with .Text }}{{ . }}{{ end -}}
</a>
