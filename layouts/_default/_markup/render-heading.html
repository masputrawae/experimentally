<h{{ .Level }} id="{{ .Anchor }}" {{- with .Attributes.class }} class="heading {{ . }}" {{- else }} class="heading" {{- end }}>
  <span class="heading__title">{{ .Text }}</span>
  <a href="#{{ .Anchor }}" class="heading__anchor" aria-label="{{ .Text }}" title="{{ .Text }}"><i class="bi bi-hash"></i></a>
</h{{ .Level }}>
