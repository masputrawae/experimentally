{{ define "main" }}
<main class="content">
  
  <header class="content__header">
    
    <h1 class="content__title">{{ .Title }}</h1>
    <div class="content__subtitle">{{ .Params.subtitle }}</div>
    
  </header>
  
  <article class="content__article markdown">
    {{ .Content | safeHTML }}
  </article>
  
</main>
{{ end }}
