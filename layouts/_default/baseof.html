<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}" data-theme="dark">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body>
    
    <div class="bg"></div>

    <div class="layout">
      <div class="layout__left" id="leftSide">
        {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
      </div>
      <div class="layout__top">
        {{ partial "topbar.html" . }}
      </div>
      <div class="layout__center">
        {{ block "main" . }}{{ end }}
      </div>
      <div class="layout__bottom">
        {{ partial "footer.html" . }}
      </div>
      <div class="layout__right" id="rightSide">
        {{ partial "right-side.html" . }}
      </div>
    </div>
  </body>
</html>
