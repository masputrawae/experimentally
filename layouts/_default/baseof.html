<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="layout">
    <div class="layout__top">{{ partial "header.html" . }}</div>
    <div class="layout__left">{{ partial "left-side.html" . }}</div>
    <div class="layout__main">{{ block "main" . }}{{ end }}</div>
    <div class="layout__bottom">{{ partial "footer.html" . }}</div>
    <div class="layout__right">{{ partial "right-side.html" . }}</div>
  </div>
</body>
</html>
