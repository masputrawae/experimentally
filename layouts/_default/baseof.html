<!DOCTYPE html>
<html 
lang="{{ site.Language.LanguageCode }}" 
dir="{{ or site.Language.LanguageDirection `ltr` }}" 
data-theme="dark">
<head>
  {{ partial "head.html" . }}
</head>
<body class="layout">
  <aside class="layout__sidebar">
    {{ partial "header.html" (dict "type" "sidebar") }}
    {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
  </aside>
  <div class="layout__main">
    {{ partial "header.html" (dict "type" "topbar") }}
    <main class="main">
      {{ partial "breadcrumbs.html" . }}
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
</body>
</html>
