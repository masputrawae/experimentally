{{ $pinned := where .Site.RegularPages "Params.pinned" true }}
{{ if $pinned }}
<nav class="navbar navbar--widget">
  <div class="navbar__label">Pinned</div>
  <ul class="nav nav--widget">
    {{ range $pinned }}
      <li class="nav__item">
        <a href="{{ .RelPermalink }}" class="btn btn--link">{{ .Title }}</a>
      </li>
    {{ end }}
  </ul>
</nav>
{{ end }}
