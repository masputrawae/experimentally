<aside class="offcanvas offcanvas--responsive offcanvas--right" id="rightOffcanvas">
  <header class="offcanvas__header">
    <form 
      class="search" 
      id="search" 
      onsubmit="handleSearch(event)" 
      method="get" 
      id="search" 
      data-search-url="{{ "search.json" | relURL }}"
      >
        <i class="bi bi-search"></i>
        <input 
          class="search__input" 
          type="search" 
          id="search-input" 
          name="query" 
          placeholder="Search for something here" 
          autocomplete="off" 
          autocorrect="off" 
          spellcheck="false" 
          >
    </form>
  
    <button class="btn btn--icon" data-toggle-offcanvas="rightOffcanvas" title="Close Right Sidebar" aria-label="Button to close right sidebar">
      <i class="bi bi-x"></i>
    </button>
  </header>

  <nav class="navbar navbar--widget" id="resultsPanel" style="display: none;">
    <div class="navbar__label">Results</div>
    <ul class="nav nav--widget" id="results"></ul>
  </nav>
  {{ if .IsPage }}
    {{ partial "widget/toc.html" . }}
    {{ partial "widget/related.html" . }}
  {{ else }}
    {{ partial "widget/taxonomy-featured.html" (dict "taxonomy" "tags" "context" .) }}
    {{ partial "widget/taxonomy-featured.html" (dict "taxonomy" "categories" "context" .) }}  
  {{ end }}
</aside>
