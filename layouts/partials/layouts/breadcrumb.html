<nav class="navbar navbar--breadcrumb" aria-label="Breadcrumb">
  <ul class="nav nav--row nav--breadcrumb">
    {{ range .Ancestors.Reverse }}
      <li class="nav__item">
        <a class="nav__link nav__link--breadcrumb" href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
    {{ end }}
    <li class="nav__item">
      <a class="nav__link nav__link--breadcrumb nav__link--active" href="{{ .RelPermalink }}" aria-current="page">{{ .Title }}</a>
    </li>
  </ul>
</nav>
