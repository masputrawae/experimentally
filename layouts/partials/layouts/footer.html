<footer class="footer">
  {{ if site.Params.giscus.active }}
    {{ partial "widget/giscus.html" . }}
  {{ end }}
  <nav class="navbar navbar--footer">
    {{- with site.Params.social }}
      {{- range $key, $value := . }}
        <a 
          href="{{ $value.url }}" 
          class="btn btn--icon btn--social"
          id="{{ $value.name }}"
          title="{{ $value.name }}" 
          aria-label="Go to {{ $value.name }}"
          data-social="{{ $value.name }}"
          rel="noopener noreferrer" target="_blank"
          >
            <i class="bi {{ $value.icon }}"></i>
        </a>
      {{- end }}
    {{- end }}
    <button 
      class="btn btn--icon btn--social" 
      data-theme-toggle="switchTheme" 
      title="Switch Theme" 
      aria-label="Switch Theme"
      >
        <i class="bi bi-moon-stars"></i>
    </button>
  </nav>
  
  <section class="footer__copyright">
    <p class="footer__content">
      <span>Made with ♥️ using </span>
      <a 
        href="https://gohugo.io" 
        class="footer__link" 
        target="_blank" 
        rel="noopener noreferrer"
      >
        Hugo
      </a> 
      &
      <a 
        href="https://pages.github.com/" 
        class="footer__link" 
        target="_blank" 
        rel="noopener noreferrer"
      >
        GitHub Pages
      </a>
    </p>
    <p>
      &copy; 
      <span>{{- now.Year | safeHTML -}}</span> - 
      <span>{{- .Site.Title -}}</span>. All rights reserved.
    </p>
  </section>
</footer>
