<header class="header header--{{ .type }}">
  
  <!-- BRAND -->
  <a href="{{ site.BaseURL | relURL }}" class="brand">
    <section class="brand__logo">
      <img src="{{ site.Params.author.logo | relURL }}" alt="Logo Image {{ site.Title }}">
    </section>
    <section class="brand__text">
      <h1 class="brand__title">{{ site.Params.author.name }}</h1>
      <em class="brand__subtitle">{{ site.Params.author.subtitle }}</em>
    </section>
  </a>
  
  <!-- TOPBAR -->
  {{ if eq .type "topbar" }}
    <div class="header__button">
      <a 
      href="{{ "search.html" | relURL }}" 
      class="btn btn--icon btn--search"
      title="Search"
      aria-label="Search button">
        <span>Tap to search</span>
        <i class="bi bi-search"></i>
      </a>
      <button 
      class="btn btn--icon" 
      id="switchTheme" 
      title="Switch Theme"
      aria-label="Switch Theme">
        <i class="bi bi-moon-stars"></i>
      </button>
      <button 
      class="btn btn--icon" 
      id="sidebarToggle"
      title="Open Sidebar"
      aria-label="Button to open Sidebar">
        <i class="bi bi-list"></i>
      </button>
    </div>
  {{ end }}
  
  <!-- SIDEBAR -->
  {{ if eq .type "sidebar" }}
    <button 
    class="btn btn--icon" 
    id="sidebarClose"
    title="Close Sidebar"
    aria-label="Button to close the Sidebar">
      <i class="bi bi-x"></i>
    </button>
  {{ end }}
</header>
