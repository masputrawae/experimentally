<header class="header">
  
  <button 
  class="btn btn--offcanvas"
  id="leftOpen"
  title="Click to open the left sidebar"
  aria-label="Click to open the left sidebar"
  >
    <i class="bi bi-list"></i>
  </button>
    
  <form class="search">
      
    <input 
    name="search" 
    type="search" 
    id="inputSearch"
    class="search__input"
    placeholder="Search input. Looking for something?"
    >
      
    <button 
    class="search__button"
    id="buttonSearch"
    title="Click to search"
    aria-label="Click to search"
    type="submit"
    >
      <i class="bi bi-search"></i>
    </button>
      
  </form>
    
  <button 
  class="btn btn--offcanvas"
  id="rightOpen"
  title="Click to open the right sidebar"
  aria-label="Click to open the right sidebar"
  >
    <i class="bi bi-book"></i>
  </button>
  
</header>
