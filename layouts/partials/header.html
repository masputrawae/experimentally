<header class="header">
  <button 
  class="btn btn--icon" 
  data-toggle-offcanvas="leftOffcanvas" 
  title="Open the left sidebar"
  aria-label="Button to open the left sidebar">
    <i class="bi bi-list"></i>
  </button>

  <button 
  class="btn btn--icon" 
  data-toggle-offcanvas="globalOffcanvasLeft" 
  title="Open directory" 
  aria-label="Button to open the directory bar">
    <i class="bi bi-folder2"></i>
  </button>
  
  <a 
  href="{{ if hugo.IsMultilingual }}{{ absLangURL "" }}{{ else }}{{ absURL "" }}{{ end }}" 
  class="btn btn--icon header__title"
  title="Home"
  aria-label="Go to Home">
    <i class="bi bi-house"></i>
  </a>
  
  <button 
  class="btn btn--icon"
  data-theme-toggle="switchTheme"
  title="Switch Themes" 
  aria-label="Button to Switch Themes">
    <i class="bi bi-moon-stars"></i>
  </button>
  
  <button
  class="btn btn--icon"
  data-toggle-offcanvas="globalOffcanvasRight"
  title="Right Sidebar"
  aria-label="Button to Right Sidebar">
    <i class="bi bi-book"></i>
  </button>
</header>
