<form 
  class="search" 
  id="search" 
  onsubmit="handleSearch(event)" 
  method="get" 
  id="search" 
  data-search-url="{{ "search.json" | relURL }}"
  >
    <i class="bi bi-search"></i>
    <input 
      class="search__input" 
      type="search" 
      id="search-input" 
      name="query" 
      placeholder="Search..." 
      autocomplete="off" 
      autocorrect="off" 
      spellcheck="false" 
      >
</form>
