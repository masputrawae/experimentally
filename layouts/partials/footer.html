<footer class="footer">
  <nav class="nav nav--footer">
    <label class="nav__label" for="mediaSocial">
      <i class="bi bi-globe2"></i>
      <span>Social Media</span>
    </label>
    <ul class="nav__list" id="mediaSocial">
      {{- with site.Params.social }}
        {{- range $key, $value := . }}
          <li class="nav__item">
            <a href="{{ $value.url }}" class="nav__link" title="{{ $value.name }}" aria-label="Go to {{ $value.name }}" rel="noopener noreferrer" target="_blank">
                <i class="bi {{ $value.icon }}"></i>
                <span>{{ $value.name }}</span>
            </a>
          </li>
        {{- end }}
      {{- end }}
    </ul>
    <button class="btn btn--icon" id="switchTheme" title="Switch Theme" aria-label="Switch Theme">
      <i class="bi bi-moon-stars"></i>
    </button>
  </nav>
  <p class="footer__content">
    <span>Made with ♥️ using </span>
    <a 
    href="https://gohugo.io" 
    class="footer__link" 
    target="_blank" 
    rel="noopener noreferrer">Hugo</a> & 
    <a 
    href="https://pages.github.com/" 
    class="footer__link" 
    target="_blank" 
    rel="noopener noreferrer">GitHub Pages</a>
  </p>
  <p>&copy; 
    <span>{{- now.Year | safeHTML -}}</span> - 
    <span>{{- .Site.Title -}}</span>. All rights reserved.
  </p>
</footer>
