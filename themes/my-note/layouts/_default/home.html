{{- define "main" -}}
<article class="home">
  <section>
    <div class="tag-clouds">
      {{ template "categories-cloud" . }}
      {{ template "tags-cloud" . }}
    </div>
    <div class="home__pagination">
      {{ range .Paginator.Pages }}
        <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      {{ end }}
      {{ template "_internal/pagination.html" . }}
    </div>
  </section>
</article>
{{- end -}}
