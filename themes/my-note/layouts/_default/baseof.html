<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
  {{ partial "head/css.html" . }}
</head>
<body class="layout">
  {{ partial "left-side.html" . }}
  <div class="main-wrapper">
    {{ partial "header.html" . }}
    {{ block "main" . }}{{ end }}
    {{ partial "footer.html" . }}
  </div>
  {{ partial "head/js.html" . }}
</body>
</html>
