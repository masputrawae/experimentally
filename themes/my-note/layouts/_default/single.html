{{ define "main" }}
<main>
  <article>
    <section>
      <figure>
        <img src="{{ .Params.image }}" alt="Gambar {{ .Title }}">
        <figcaption>
          {{ .Params.description }}
        </figcaption>
      </figure>
      {{ $dateMachine := .Date | time.Format "2006-01-02T15:04:05-07:00" }}
      {{ $dateHuman := .Date | time.Format ":date_long" }}
      <time datetime="{{ $dateMachine }}">{{ $dateHuman }}</time>
    </section>

    <section id="contentArticle">
      {{ .Content }}
    </section>
  </article>
</main>
{{ end }}
