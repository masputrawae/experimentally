{{- define "main" -}}
<article>
  <header>
    <h1>{{- .Title -}}</h1>
  </header>
  
  <section id="contentArticle">
    {{- .Content -}}
  </section>
  
  <nav>
    <ul>
      {{- range .Pages -}}
        <li>
          <a href="{{- .Permalink -}}">{{- .Title -}}</a>
        </li>
      {{- end -}}
    </ul>
  </nav>
</article>
{{- end -}}
