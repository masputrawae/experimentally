<aside class="sidebar sidebar--left">
  <header class="sidebar__header">
    <div class="sidebar__header-container">
      <a class="sidebar__title" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
      <div class="sidebar__actions">
        <button class="btn btn--icon sidebar__button" id="switchTheme">
          <i class="bi bi-moon"></i>
        </button>
        <button class="btn btn--icon sidebar__button" id="leftClose">
          <i class="bi bi-x"></i>
        </button>
      </div>
    </div>
    
    <form class="sidebar__form">
      <input class="sidebar__input" type="search">
      <button class="btn btn--icon sidebar__button sidebar__button--search" type="submit">
        <i class="bi bi-search"></i>
      </button>
    </form>
  </header>
  
  <nav class="menu">
    <button class="btn btn--text sidebar__button" id="toggleCollapseAll">
      <i class="bi bi-folder2"></i>
      <span>Root</span>
    </button>
    <ul class="menu__list">
      {{- template "collapsible_nav" .Site.Home -}}
    </ul>
  </nav>
</aside>
