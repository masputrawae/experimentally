<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/github-calendar@latest/dist/github-calendar.min.js"></script>
<script>
  // Tampilkan kalender GitHub (tanpa API)
  GitHubCalendar("#github-calendar", "{{- .Site.Params.usernameGithub -}}", {
    responsive: true,
    global_stats: true,
    tooltips: true
  });

  const username = "{{- .Site.Params.usernameGithub -}}";
  let allRepos = [];
  let filteredRepos = [];
  let visibleCount = 5;

  // Fetch Profil GitHub (tanpa API token)
  async function fetchProfile() {
    try {
      let response = await fetch(`https://api.github.com/users/${username}`);
      if (!response.ok) throw new Error(`GitHub API Error: ${response.status}`);

      let data = await response.json();
      document.getElementById("github-overview").innerHTML = `
        <img src="${data.avatar_url}" width="100" style="border-radius: 50%;">
        <h3><a href="${data.html_url}" target="_blank">${data.name || data.login}</a></h3>
        <p>${data.bio || "Tidak ada bio."}</p>
        <p>🔗 <a href="${data.blog}" target="_blank">${data.blog || "Tidak ada website"}</a></p>
        <p>📌 Public Repos: ${data.public_repos} | Followers: ${data.followers}</p>
      `;
    } catch (error) {
      console.error("Error fetching profile:", error);
      document.getElementById("github-overview").innerHTML = `<p class="error-message">Gagal memuat profil.</p>`;
    }
  }

  // Fetch Repositori GitHub (tanpa API token)
  async function fetchRepos(page = 1) {
    try {
      let response = await fetch(`https://api.github.com/users/${username}/repos?per_page=100&page=${page}`);
      if (!response.ok) throw new Error(`GitHub API Error: ${response.status}`);

      let repos = await response.json();
      if (repos.length > 0) {
        allRepos = allRepos.concat(repos);
        await fetchRepos(page + 1);
      } else {
        processRepos();
      }
    } catch (error) {
      console.error("Error fetching repos:", error);
      document.getElementById("github-repo-cards").innerHTML = `<p class="error-message">Gagal memuat repositori.</p>`;
    }
  }

  // Proses dan tampilkan repositori
  function processRepos() {
    allRepos.sort((a, b) => b.stargazers_count - a.stargazers_count);
    const languages = [...new Set(allRepos.map(repo => repo.language).filter(Boolean))];

    document.getElementById("language-filter").innerHTML = `<option value="all">Semua Bahasa</option>` +
      languages.map(lang => `<option value="${lang}">${lang}</option>`).join("");

    filteredRepos = allRepos;
    displayRepoCards();
  }

  function displayRepoCards() {
    let reposToShow = filteredRepos.slice(0, visibleCount);

    document.getElementById("github-repo-cards").innerHTML = reposToShow.map(repo => `
      <div class="repo-card">
        <h3><a href="${repo.html_url}" target="_blank">${repo.name}</a></h3>
        <p>${repo.description || "Tidak ada deskripsi"}</p>
        <div class="repo-meta">
          <span>⭐ ${repo.stargazers_count} Stars</span>
          <span>🍴 ${repo.forks_count} Forks</span>
          <span>💻 ${repo.language || "Tidak diketahui"}</span>
        </div>
        <small>🕒 Update terakhir: ${new Date(repo.updated_at).toLocaleDateString()}</small>
      </div>
    `).join("");

    document.getElementById("load-more").style.display = (visibleCount < filteredRepos.length) ? "block" : "none";
  }

  function filterReposByLanguage() {
    const selectedLanguage = document.getElementById("language-filter").value;
    filteredRepos = selectedLanguage === "all" ? allRepos : allRepos.filter(repo => repo.language === selectedLanguage);
    visibleCount = 5;
    displayRepoCards();
  }
  function loadMoreRepos() {
    visibleCount += 5;
    displayRepoCards();
  }
  fetchProfile();
  fetchRepos();
</script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    renderMathInElement(document.body, {
      delimiters: [
        {left: '\\[', right: '\\]', display: true},
        {left: '$$', right: '$$', display: true},
        {left: '\\(', right: '\\)', display: true},
        {left: '$', right: '$', display: true }
      ],
      throwOnError : false
    });
  });
</script>

{{- with resources.Get "js/main.js" }}
  {{- if eq hugo.Environment "development" }}
    {{- with . | js.Build }}
      <script src="{{ .RelPermalink }}"></script>
    {{- end }}
  {{- else }}
    {{- $opts := dict "minify" true }}
    {{- with . | js.Build $opts | fingerprint }}
      <script src="{{ .RelPermalink }}" integrity="{{- .Data.Integrity }}" crossorigin="anonymous"></script>
    {{- end }}
  {{- end }}
{{- end }}
