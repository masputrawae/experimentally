<footer class="footer">
  <div class="footer__container">
    <div class="footer__brand">
      <a href="/" class="footer__logo">
        <img src="/images/logo.png" alt="Logo">
      </a>
      <p class="footer__slogan">Membangun web yang lebih baik</p>
    </div>

    <nav class="footer__nav">
      <ul class="footer__nav-list">
        <li class="footer__item"><a href="/about" class="footer__link">Tentang</a></li>
        <li class="footer__item"><a href="/blog" class="footer__link">Blog</a></li>
        <li class="footer__item"><a href="/contact" class="footer__link">Kontak</a></li>
        <li class="footer__item"><a href="/privacy-policy" class="footer__link">Kebijakan Privasi</a></li>
      </ul>
    </nav>

    <div class="footer__contact">
      <p>Email: <a href="mailto:info@example.com" class="footer__link">info@example.com</a></p>
      <p>Telepon: <a href="tel:+62123456789" class="footer__link">+62 123 456 789</a></p>
    </div>

    <ul class="footer__social">
      {{ range .Site.Params.socialMedia }}
        <li class="footer__item">
          <a class="footer__link footer__link--icon" id="{{ .social }}" href="{{ .url }}" target="_blank">
            <i class="bi {{ .icon }}"></i>
          </a>
        </li>
      {{ end }}
    </ul>
  </div>

  <div class="footer__bottom">
    <p>&copy; {{ now.Year }}. All rights reserved. <a href="/privacy-policy" class="footer__link">Privacy Policy</a></p>
  </div>
</footer>
