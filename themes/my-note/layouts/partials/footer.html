<footer class="footer">
  <div class="footer__container">
    <div class="footer__brand">
      <a href="/" class="footer__logo">
        <img src="https://placehold.co/70" alt="Logo" loading="lazy">
      </a>
      <h2 class="footer__title">{{ .Site.Title }}</h2>
      <p class="footer__description">{{ .Site.Params.description }}</p>
    </div>

    <ul class="footer__social">
      {{ range .Site.Params.socialMedia }}
        <li class="footer__item">
          <a class="footer__link footer__link--icon" href="{{ .url }}" target="_blank" rel="noopener">
            <i class="bi {{ .icon }}"></i>
          </a>
        </li>
      {{ end }}
    </ul>

    <div class="footer__bottom">
      <p>Made with ♥️ using <a href="https://gohugo.io" class="footer__link" target="_blank" rel="noopener">Hugo</a></p>
      <p>&copy; {{ now.Year }} {{ .Site.Title }}. All rights reserved.</p>
    </div>
  </div>
</footer>
