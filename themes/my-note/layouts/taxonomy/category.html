{{- define "main" -}}
<main>
  <article>
    <header>
      <h1>Posts with Category: {{- .Title -}}</h1>
    </header>
    
    <section id="contentArticle">
      {{- .Content -}}
    </section>
    
    <nav>
      <ul>
        {{- range .Pages -}}
          <li>
            <a href="{{- .Permalink -}}">{{- .Title -}}</a>
          </li>
        {{- end -}}
      </ul>
    </nav>
  </article>
</main>
{{- end -}}
